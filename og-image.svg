<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="orb1" cx="0.15" cy="0.25" r="0.5">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="0.85" cy="0.75" r="0.45">
      <stop offset="0%" stop-color="#0d9488" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#0d9488" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0.4">
      <stop offset="0%" stop-color="#fafafa"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#09090b"/>
  <rect width="1200" height="630" fill="url(#orb1)"/>
  <rect width="1200" height="630" fill="url(#orb2)"/>

  <!-- Subtle grid (suggests cartography / CRS) -->
  <g stroke="#10b981" stroke-width="0.5" stroke-opacity="0.08">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="100" y1="0" x2="100" y2="630"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="500" y1="0" x2="500" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="700" y1="0" x2="700" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
    <line x1="1100" y1="0" x2="1100" y2="630"/>
  </g>

  <!-- Country pill -->
  <g transform="translate(80, 100)">
    <rect width="380" height="50" rx="25" fill="#10b981" fill-opacity="0.12" stroke="#10b981" stroke-opacity="0.35" stroke-width="1"/>
    <text x="22" y="33" font-family="-apple-system, Segoe UI, Roboto, sans-serif" font-size="20" font-weight="500" fill="#fafafa">🇷🇴 🇵🇱 🇨🇿 🇸🇰 🇮🇹 🇩🇪 · 6 EU countries</text>
  </g>

  <!-- Title -->
  <text x="80" y="240" font-family="-apple-system, Segoe UI, Roboto, sans-serif" font-size="88" font-weight="700" fill="url(#title)">TopoXY</text>

  <!-- Tagline -->
  <text x="80" y="320" font-family="-apple-system, Segoe UI, Roboto, sans-serif" font-size="42" font-weight="600" fill="#fafafa">Professional CRS Conversion</text>
  <text x="80" y="372" font-family="-apple-system, Segoe UI, Roboto, sans-serif" font-size="42" font-weight="600" fill="#fafafa">for 6 EU Countries</text>

  <!-- CRS list -->
  <text x="80" y="455" font-family="-apple-system, SF Mono, Menlo, Consolas, monospace" font-size="22" font-weight="500" fill="#a1a1aa">Stereo 70 · PUWG 1992 · S-JTSK Křovák</text>
  <text x="80" y="490" font-family="-apple-system, SF Mono, Menlo, Consolas, monospace" font-size="22" font-weight="500" fill="#a1a1aa">Gauss-Boaga · ETRS89 / UTM ↔ WGS 84</text>

  <!-- URL -->
  <text x="80" y="570" font-family="-apple-system, Segoe UI, Roboto, sans-serif" font-size="22" font-weight="600" fill="#10b981">topoxyapp.com</text>

  <!-- Decorative crosshair (TopoXY mark, right side) -->
  <g transform="translate(950, 315)">
    <circle r="180" fill="none" stroke="#10b981" stroke-width="2" stroke-opacity="0.25"/>
    <circle r="120" fill="none" stroke="#10b981" stroke-width="2" stroke-opacity="0.35"/>
    <circle r="60" fill="none" stroke="#10b981" stroke-width="2" stroke-opacity="0.5"/>
    <line x1="-220" y1="0" x2="220" y2="0" stroke="#10b981" stroke-width="1.5" stroke-opacity="0.35"/>
    <line x1="0" y1="-220" x2="0" y2="220" stroke="#10b981" stroke-width="1.5" stroke-opacity="0.35"/>
    <g transform="rotate(45)">
      <line x1="-90" y1="0" x2="90" y2="0" stroke="#10b981" stroke-width="10" stroke-linecap="round"/>
    </g>
    <g transform="rotate(-45)">
      <line x1="-90" y1="0" x2="90" y2="0" stroke="#10b981" stroke-width="10" stroke-linecap="round"/>
    </g>
  </g>
</svg>
